<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Screen Sections with Bootstrap 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .full-screen-section {
      height: calc(100vh - 56px); /* Adjusted height for navbar */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2rem;
    }
    .section-1 { background-color: #007bff; } /* Blue */
    .section-2 { background-color: #28a745; } /* Green */
    .section-3 { background-color: #dc3545; } /* Red */
    .section-4 { background-color: #ffc107; } /* Yellow */
    .section-5 { background-color: #6c757d; } /* Grey */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1030; /* Ensure it's above the rest of the content */
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Your Logo</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#section1">Section 1</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#section2">Section 2</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#section3">Section 3</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#section4">Section 4</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#section5">Section 5</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid p-0">
    <div class="row">
      <div id="section1" class="col full-screen-section section-1">
        Section 1
      </div>
    </div>
    <div class="row">
      <div id="section2" class="col full-screen-section section-2">
        Section 2
      </div>
    </div>
    <div class="row">
      <div id="section3" class="col full-screen-section section-3">
        Section 3
      </div>
    </div>
    <div class="row">
      <div id="section4" class="col full-screen-section section-4">
        Section 4
      </div>
    </div>
    <div class="row">
      <div id="section5" class="col full-screen-section section-5">
        Section 5
      </div>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="progress-bar">
    <div class="progress" style="height: 3px;">
      <div id="progress-bar-inner" class="progress-bar bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
  </div>

  <script>
    window.addEventListener('scroll', function() {
      const scrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrolled = (window.scrollY / scrollableHeight) * 100;
      document.getElementById('progress-bar-inner').style.width = scrolled + '%';
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
